<script type="module">
import * as THREE from 'three';

// ---------- Рендерер и сцена ----------
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2238);
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 200);
camera.position.set(0, 0, 3.2);

const sun = new THREE.DirectionalLight(0xffffff, 2.8);
sun.position.set(5, 2, 3);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x8899aa, 1.5));

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

{
  const positions = new Float32Array(2500 * 3);
  for (let i = 0; i < positions.length; i += 3) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(60 + Math.random() * 60);
    positions[i] = v.x; positions[i + 1] = v.y; positions[i + 2] = v.z;
  }
  const geo = new THREE.BufferGeometry();

// ---------- Базовый глобус (виден издалека, под тайлами) ----------
const TEX_W = 4096, TEX_H = 2048;
const earthMat = new THREE.MeshPhongMaterial({ shininess: 12, specular: 0x223344 });

const tiltGroup = new THREE.Group();   // наклон (drag по вертикали)
const spinGroup = new THREE.Group();   // вращение (drag по горизонтали)
tiltGroup.add(spinGroup);
scene.add(tiltGroup);

const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 96, 64), earthMat);
spinGroup.add(earth);

const tilesGroup = new THREE.Group();   // тайлы снимков поверх глобуса
spinGroup.add(tilesGroup);
const overlayGroup = new THREE.Group(); // границы и названия поверх снимков
spinGroup.add(overlayGroup);

// Атмосферное свечение (fresnel на задней стороне увеличенной сферы)
const atmo = new THREE.Mesh(
  new THREE.SphereGeometry(1.06, 64, 48),
  new THREE.ShaderMaterial({
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      varying vec3 vNormal;
      void main() {
        float rim = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 4.5);
        gl_FragColor = vec4(0.35, 0.55, 1.0, 1.0) * rim * 0.55;
      }`,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  })
);
spinGroup.add(atmo);

let earthReady = false;

function drawProceduralEarth(ctx) {
  const g = ctx.createLinearGradient(0, 0, 0, TEX_H);
  g.addColorStop(0, '#0a2a52'); g.addColorStop(0.5, '#0e3a6e'); g.addColorStop(1, '#0a2a52');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, TEX_W, TEX_H);
  let seed = 1337;
  const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;
  ctx.globalAlpha = 0.9;
  for (let c = 0; c < 14; c++) {
    const cx = rnd() * TEX_W, cy = TEX_H * (0.18 + rnd() * 0.64);
    const hue = 80 + rnd() * 40, size = 60 + rnd() * 140;
    for (let b = 0; b < 40; b++) {
      const a = rnd() * Math.PI * 2, d = rnd() * size;
      ctx.fillStyle = `hsl(${hue + rnd() * 20}, ${35 + rnd() * 20}%, ${28 + rnd() * 14}%)`;
      ctx.beginPath();
      ctx.ellipse((cx + Math.cos(a) * d * 1.6 + TEX_W) % TEX_W, cy + Math.sin(a) * d,
        20 + rnd() * 50, 14 + rnd() * 34, rnd() * Math.PI, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#e8f0f6';
  ctx.fillRect(0, 0, TEX_W, TEX_H * 0.05);
  ctx.fillRect(0, TEX_H * 0.95, TEX_W, TEX_H * 0.05);
}

function loadEarthTexture() {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const fallback = setTimeout(() => resolve(null), 15000);
    img.onload = () => { clearTimeout(fallback); resolve(img); };
    img.onerror = () => { clearTimeout(fallback); resolve(null); };
    img.src = 'https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg';
  });
}

loadEarthTexture().then((img) => {
  const c = document.createElement('canvas');
  c.width = TEX_W; c.height = TEX_H;
  const ctx = c.getContext('2d');
  if (img) ctx.drawImage(img, 0, 0, TEX_W, TEX_H);
  else drawProceduralEarth(ctx);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  earthMat.map = tex;
  earthMat.needsUpdate = true;
  earthReady = true;
  const loading = document.getElementById('loading');
  loading.style.opacity = '0';
  setTimeout(() => loading.remove(), 700);
});

new THREE.TextureLoader().load(
  'https://unpkg.com/three-globe@2.31.0/example/img/earth-topology.png',
  (tex) => { earthMat.bumpMap = tex; earthMat.bumpScale = 0.6; earthMat.needsUpdate = true; }
);

// ---------- Тайлы спутниковых снимков (Web Mercator, как на картах) ----------
const MAX_MERC_LAT = 85.05112878 * Math.PI / 180;
const tileLoader = new THREE.TextureLoader();
tileLoader.setCrossOrigin('anonymous');

// Слои тайлов: спутниковые снимки (только вблизи) и границы/названия (на любом зуме)
const LAYERS = [
  {
    name: 'imagery',
    url: (z, x, y) => `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${z}/${y}/${x}`,
    group: tilesGroup, cache: new Map(), meshes: new Map(), lastDesired: new Set(),
    unlit: false, rOff: 0, minZ: 3, enabled: true,
    active: (s) => s <= 1.2,
  },
  {
    name: 'labels',
    url: (z, x, y) => `https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/${z}/${y}/${x}`,
    group: overlayGroup, cache: new Map(), meshes: new Map(), lastDesired: new Set(),
    unlit: true, rOff: 0.0009, minZ: 2, enabled: true,
    active: () => true,
  },
];

function latToTileYf(lat, n) {
  lat = THREE.MathUtils.clamp(lat, -MAX_MERC_LAT, MAX_MERC_LAT);
  return (1 - Math.log(Math.tan(lat / 2 + Math.PI / 4)) / Math.PI) / 2 * n;
}
function tileYfToLat(yf, n) {
  return Math.atan(Math.sinh(Math.PI * (1 - 2 * yf / n)));
}
// Соглашение осей совпадает с UV-развёрткой SphereGeometry и равнопромежуточной текстурой
function lonLatToDir(lon, lat) {
  return new THREE.Vector3(
    Math.cos(lat) * Math.cos(lon),
    Math.sin(lat),
    -Math.cos(lat) * Math.sin(lon)
  );
}

function makeTileGeometry(z, x, y, rOff) {
  const SEG = 8, n = 1 << z;
  const R = 1.0003 + z * 0.00015 + rOff; // чем детальнее уровень, тем выше слой
  const pos = [], uv = [], idx = [];
  for (let j = 0; j <= SEG; j++) {
    const lat = tileYfToLat(y + j / SEG, n);
    for (let i = 0; i <= SEG; i++) {
      const lon = ((x + i / SEG) / n) * 2 * Math.PI - Math.PI;
      const p = lonLatToDir(lon, lat).multiplyScalar(R);
      pos.push(p.x, p.y, p.z);
      uv.push(i / SEG, 1 - j / SEG);
    }
  }
  const W = SEG + 1;
  for (let j = 0; j < SEG; j++) {
    for (let i = 0; i < SEG; i++) {
      const a = j * W + i, b = a + 1, c = a + W, d = c + 1;
      idx.push(a, c, b, b, c, d);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

const tileKey = (z, x, y) => z + '/' + x + '/' + y;

function computeDesiredTiles(minZ) {
  const d = zoom, s = Math.max(0.02, d - 1);
  if (!earthReady) return [];
  const zt = THREE.MathUtils.clamp(Math.ceil(Math.log2(0.0296 * window.innerHeight / s)), minZ, 10);
  const n = 1 << zt;
  const camLocal = spinGroup.worldToLocal(camera.position.clone()).normalize();
  const lat = Math.asin(THREE.MathUtils.clamp(camLocal.y, -1, 1));
  const lon = Math.atan2(-camLocal.z, camLocal.x);

  // Угловой радиус видимой области: лучи через углы экрана
  let gamma = 0, allHit = true;
  for (const [cx, cy] of [[-1, -1], [1, -1], [-1, 1], [1, 1]]) {
    raycaster.setFromCamera(new THREE.Vector2(cx, cy), camera);
    const hit = raycaster.intersectObject(earth)[0];
    if (!hit) { allHit = false; break; }
    const hl = earth.worldToLocal(hit.point.clone()).normalize();
    gamma = Math.max(gamma, Math.acos(THREE.MathUtils.clamp(hl.dot(camLocal), -1, 1)));
  }
  const horizon = Math.acos(1 / d);
  gamma = allHit ? Math.min(gamma * 1.25 + Math.PI / n, horizon) : horizon + 0.05;

  const y0 = Math.max(0, Math.floor(latToTileYf(lat + gamma, n)));
  const y1 = Math.min(n - 1, Math.floor(latToTileYf(lat - gamma, n)));
  const xC = Math.floor(((lon + Math.PI) / (2 * Math.PI)) * n);
  const halfLon = Math.PI / n;
  const out = [], seen = new Set();
  for (let yt = y0; yt <= y1; yt++) {
    const rowLat = tileYfToLat(yt + 0.5, n);
    const dx = Math.min(Math.ceil(gamma / (2 * halfLon * Math.max(0.12, Math.cos(rowLat)))) + 1, n >> 1);
    for (let k = -dx; k <= dx; k++) {
      const xt = ((xC + k) % n + n) % n;
      const key = tileKey(zt, xt, yt);
      if (seen.has(key)) continue;
      seen.add(key);
      const cLon = ((xt + 0.5) / n) * 2 * Math.PI - Math.PI;
      const dist = Math.acos(THREE.MathUtils.clamp(lonLatToDir(cLon, rowLat).dot(camLocal), -1, 1));
      if (dist < gamma + 2.2 * halfLon / Math.max(0.3, Math.cos(rowLat))) out.push({ zt, xt, yt, dist });
    }
  }
  out.sort((a, b) => a.dist - b.dist);
  return out.slice(0, 160);
}

function addTileMesh(L, key, t, tex) {
  const mat = L.unlit
    ? new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
    : new THREE.MeshPhongMaterial({ map: tex, side: THREE.DoubleSide, shininess: 6, specular: 0x111111 });
  const mesh = new THREE.Mesh(makeTileGeometry(t.zt, t.xt, t.yt, L.rOff), mat);
  L.group.add(mesh);
  L.meshes.set(key, mesh);
}

function reconcileLayer(L) {
  const desired = (L.enabled && L.active(zoom - 1)) ? computeDesiredTiles(L.minZ) : [];
  const curZ = desired.length ? desired[0].zt : 0;
  const desiredKeys = new Set(desired.map((t) => tileKey(t.zt, t.xt, t.yt)));
  L.lastDesired = desiredKeys;

  for (const t of desired) {
    const key = tileKey(t.zt, t.xt, t.yt);
    if (L.meshes.has(key)) continue;
    const cached = L.cache.get(key);
    if (cached === 'loading' || cached === 'error') continue;
    if (cached) { addTileMesh(L, key, t, cached); continue; }
    L.cache.set(key, 'loading');
    tileLoader.load(L.url(t.zt, t.xt, t.yt), (tex) => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      L.cache.set(key, tex);
      if (L.lastDesired.has(key) && !L.meshes.has(key)) addTileMesh(L, key, t, tex);
    }, undefined, () => L.cache.set(key, 'error'));
  }

  // Тайлы прежнего уровня остаются подложкой, пока не догрузится текущий
  const allLoaded = desired.every((t) => L.meshes.has(tileKey(t.zt, t.xt, t.yt)));
  for (const [key, mesh] of L.meshes) {
    if (desiredKeys.has(key)) continue;
    const z = Number(key.split('/')[0]);
    if (allLoaded || z === curZ || desired.length === 0) {
      L.group.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();
      L.meshes.delete(key);
    }
  }

  if (L.cache.size > 400) {
    for (const [key, tex] of L.cache) {
      if (L.cache.size <= 300) break;
      if (L.meshes.has(key) || tex === 'loading') continue;
      if (tex !== 'error' && tex.dispose) tex.dispose();
      L.cache.delete(key);
    }
  }
}

function reconcileTiles() {
  for (const L of LAYERS) reconcileLayer(L);
}

// ---------- Кратеры-декали (поверх тайлов, видны на любом зуме) ----------
function orthoBasis(n) {
  const t1 = Math.abs(n.y) < 0.99
    ? new THREE.Vector3().crossVectors(n, new THREE.Vector3(0, 1, 0)).normalize()
    : new THREE.Vector3(1, 0, 0);
  const t2 = new THREE.Vector3().crossVectors(n, t1).normalize();
  return [t1, t2];
}

// Изогнутая «нашлёпка» на сфере вокруг нормали n, полуугол ang, радиус R
function makePatchGeometry(n, ang, R, rot) {
  const SEG = 12;
  const [t1, t2] = orthoBasis(n);
  const tanA = Math.tan(ang);
  const cr = Math.cos(rot), sr = Math.sin(rot);
  const pos = [], uv = [], idx = [];
  for (let j = 0; j <= SEG; j++) {
    for (let i = 0; i <= SEG; i++) {
      const gx = (i / SEG) * 2 - 1, gy = (j / SEG) * 2 - 1;
      const rx = gx * cr - gy * sr, ry = gx * sr + gy * cr;
      const p = n.clone()
        .addScaledVector(t1, rx * tanA)
        .addScaledVector(t2, ry * tanA)
        .normalize().multiplyScalar(R);
      pos.push(p.x, p.y, p.z);
      uv.push(i / SEG, 1 - j / SEG);
    }
  }
  const W = SEG + 1;
  for (let j = 0; j < SEG; j++) {
    for (let i = 0; i < SEG; i++) {
      const a = j * W + i, b = a + 1, c = a + W, d = c + 1;
      idx.push(a, c, b, b, c, d);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

// Сферический «купол» вокруг эпицентра; атрибут aAng — доля углового расстояния до края
function makeShockwaveGeometry(n, maxAng, R) {
  const RS = 40, AS = 96;
  const [t1, t2] = orthoBasis(n);
  const pos = [], aAng = [], idx = [];
  for (let j = 0; j <= RS; j++) {
    const ang = maxAng * j / RS;
    const ca = Math.cos(ang), sa = Math.sin(ang);
    for (let i = 0; i <= AS; i++) {
      const phi = 2 * Math.PI * i / AS;
      const p = n.clone().multiplyScalar(ca)
        .addScaledVector(t1, Math.cos(phi) * sa)
        .addScaledVector(t2, Math.sin(phi) * sa)
        .multiplyScalar(R);
      pos.push(p.x, p.y, p.z);
      aAng.push(j / RS);
    }
  }
  const W = AS + 1;
  for (let j = 0; j < RS; j++) {
    for (let i = 0; i < AS; i++) {
      const a = j * W + i, b = a + 1, c = a + W, d = c + 1;
      idx.push(a, c, b, b, c, d);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('aAng', new THREE.Float32BufferAttribute(aAng, 1));
  geo.setIndex(idx);
  return geo;
}

function makeCraterTexture(seed) {
  const S = 256;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const ctx = c.getContext('2d');
  let s = seed;
  const rnd = () => (s = (s * 16807) % 2147483647) / 2147483647;
  const cx = S / 2, cy = S / 2, R = S * 0.36;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  g.addColorStop(0, 'rgba(14, 10, 8, 0.98)');
  g.addColorStop(0.5, 'rgba(36, 25, 17, 0.88)');
  g.addColorStop(0.78, 'rgba(58, 40, 26, 0.5)');
  g.addColorStop(1, 'rgba(58, 40, 26, 0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fill();
  for (let i = 0; i < 18; i++) {
    const a = rnd() * Math.PI * 2, d = R * (0.55 + rnd() * 0.6), br = R * (0.1 + rnd() * 0.22);
    const bx = cx + Math.cos(a) * d, by = cy + Math.sin(a) * d;
    const gg = ctx.createRadialGradient(bx, by, 0, bx, by, br);
    const al = 0.25 + rnd() * 0.35;
    gg.addColorStop(0, `rgba(30, 21, 14, ${al})`);
    gg.addColorStop(1, 'rgba(30, 21, 14, 0)');
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const glowColorCold = new THREE.Color(0x661505);

function updateGlows(dt) {
  for (let i = glowDecals.length - 1; i >= 0; i--) {
    const g = glowDecals[i];
    g.age += dt;
    if (g.age > 50) {
      spinGroup.remove(g.mesh);
      g.mesh.geometry.dispose();
      g.mesh.material.dispose();
      glowDecals.splice(i, 1);
      continue;
    }
    const heat = Math.pow(1 - g.age / 50, 1.6);
    g.mesh.material.opacity = heat * 0.95;
    g.mesh.material.color.lerpColors(glowColorHot, glowColorCold, Math.min(1, g.age / 25));
  }
}

function makeSoftTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 64, 64);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ---------- Звук ----------
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function boomSound(intensity) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime, dur = 6;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2.6);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(700, t0);
  lp.frequency.exponentialRampToValueAtTime(35, t0 + dur);
  const ng = audioCtx.createGain();
  ng.gain.value = 0.45 * intensity;
  noise.connect(lp).connect(ng).connect(audioCtx.destination);
  noise.start(t0);

  const osc = audioCtx.createOscillator();
  osc.frequency.setValueAtTime(60, t0);
  osc.frequency.exponentialRampToValueAtTime(24, t0 + dur);
  const og = audioCtx.createGain();
  og.gain.setValueAtTime(0.35 * intensity, t0);
  og.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(og).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur);
}

const effects = []; // объекты с методом update(dt) → false, когда эффект закончился
let shake = 0;

// Процедурная модель МБР, собрана вдоль +z (нос к цели)
function buildMissileModel() {
  const m = new THREE.Group();
  const white = new THREE.MeshPhongMaterial({ color: 0xf0f0f0, shininess: 70, specular: 0x666666 });
  const dark = new THREE.MeshPhongMaterial({ color: 0x1c1c1e, shininess: 30, specular: 0x333333 });
  const grey = new THREE.MeshPhongMaterial({ color: 0xb9bec4, shininess: 40, specular: 0x444444 });
  const add = (geo, mat, z) => {
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = Math.PI / 2;
    mesh.position.z = z;
    m.add(mesh);
    return mesh;
  };
  add(new THREE.ConeGeometry(0.0062, 0.02, 24), dark, 0.035);               // боеголовка
  add(new THREE.CylinderGeometry(0.0062, 0.0062, 0.032, 24), white, 0.009); // вторая ступень
  add(new THREE.CylinderGeometry(0.0064, 0.0064, 0.005, 24), dark, -0.009); // межступенчатое кольцо
  add(new THREE.CylinderGeometry(0.0068, 0.0068, 0.034, 24), grey, -0.028); // первая ступень
  add(new THREE.CylinderGeometry(0.003, 0.0058, 0.008, 24), dark, -0.048);  // сопло
  for (let i = 0; i < 4; i++) { // стабилизаторы
    const fin = new THREE.Mesh(new THREE.BoxGeometry(0.0012, 0.011, 0.016), dark);
    const a = i * Math.PI / 2 + Math.PI / 4;
    fin.position.set(Math.cos(a) * 0.009, Math.sin(a) * 0.009, -0.038);
    fin.rotation.z = a - Math.PI / 2;
    m.add(fin);
  }
  const flame = new THREE.Mesh( // факел двигателя
    new THREE.ConeGeometry(0.0052, 0.035, 16),
    new THREE.MeshBasicMaterial({
      color: 0xffb050, transparent: true, opacity: 0.9,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  flame.rotation.x = -Math.PI / 2; // остриё факела назад
  flame.position.z = -0.066;
  m.add(flame);
  return { model: m, flame };
}

function spawnMissile(localPoint, yieldMt) {
  const n = localPoint.clone().normalize();
  const group = new THREE.Group();
  const { model, flame } = buildMissileModel();
  group.add(model);
  const trail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.003, 0.011, 0.35, 8),
    new THREE.MeshBasicMaterial({
      color: 0xff9944, transparent: true, opacity: 0.55,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  trail.rotation.x = Math.PI / 2;
  trail.position.z = -0.26; // позади ракеты
  group.add(trail);
  group.position.copy(n.clone().multiplyScalar(2.6));
  group.lookAt(spinGroup.localToWorld(new THREE.Vector3(0, 0, 0)));
  spinGroup.add(group);

  let t = 0;
  const flightTime = 2.6;
  effects.push({
    update(dt) {
      t += dt;
      const k = Math.min(1, t / flightTime);
      const dist = 2.6 - (2.6 - 1.0) * k * k; // разгон к поверхности
      group.position.copy(n.clone().multiplyScalar(dist));
      group.lookAt(spinGroup.localToWorld(new THREE.Vector3(0, 0, 0)));
      model.rotation.z += dt * 1.5;                    // медленное вращение вокруг оси
      flame.scale.y = 0.8 + Math.random() * 0.45;      // дрожание факела
      if (k >= 1) {
        spinGroup.remove(group);
        group.traverse((c) => {
          if (c.isMesh) { c.geometry.dispose(); c.material.dispose(); }
        });
        detonate(n, yieldMt);
        return false;
      }
      return true;
    },
  });
}

function detonate(n, yieldMt) {
  const ys = { 1: 0.6, 10: 1.0, 100: 1.7 }[yieldMt];
  // чем мощнее заряд, тем медленнее и тяжелее разворачивается взрыв
  const ts = { 1: 0.8, 10: 1.0, 100: 1.4 }[yieldMt];
  const surface = n.clone();

  // Постоянный кратер + остывающая раскалённая кайма (декали над тайлами)
  const angPatch = { 1: 0.05, 10: 0.082, 100: 0.14 }[yieldMt];
  const rot = Math.random() * Math.PI * 2;
  const crater = new THREE.Mesh(
    makePatchGeometry(surface, angPatch, 1.0032, rot),
    new THREE.MeshLambertMaterial({
      map: craterTexes[(Math.random() * craterTexes.length) | 0],
      transparent: true, depthWrite: false, side: THREE.DoubleSide,
    })
  );
  crater.renderOrder = 1;
  spinGroup.add(crater);
  craterDecals.push(crater);

  const glowMesh = new THREE.Mesh(
    makePatchGeometry(surface, angPatch * 1.15, 1.0036, rot),
    new THREE.MeshBasicMaterial({
      map: softTex, color: glowColorHot.clone(), transparent: true, opacity: 0.95,
      blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
    })
  );
  glowMesh.renderOrder = 2;
  spinGroup.add(glowMesh);
  glowDecals.push({ mesh: glowMesh, age: 0 });

  boomSound(ys);
  shake = Math.max(shake, 0.02 * ys);

  // Свет вспышки
  const light = new THREE.PointLight(0xffcc77, 0, 3);
  light.position.copy(surface.clone().multiplyScalar(1.1));
  spinGroup.add(light);

  // Огненный шар: ярое ядро, мягко тающая кромка
  const fireball = new THREE.Mesh(
    new THREE.SphereGeometry(1, 48, 32),
    new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: new THREE.Color(0xffee99) },
        uOp: { value: 1 },
      },
      vertexShader: `
        varying vec3 vN, vV;
        void main() {
          vN = normalize(normalMatrix * normal);
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vV = -normalize(mv.xyz);
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: `
        varying vec3 vN, vV;
        uniform vec3 uColor;
        uniform float uOp;
        void main() {
          float k = clamp(dot(normalize(vN), normalize(vV)), 0.0, 1.0);
          float a = pow(k, 1.6); // яркое ядро, прозрачный край
          gl_FragColor = vec4(uColor * (0.7 + 0.5 * a), a * uOp);
        }`,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    })
  );
  fireball.position.copy(surface.clone().multiplyScalar(1.01));
  fireball.scale.setScalar(0.01);
  spinGroup.add(fireball);

  // Ударная волна: фронт, ползущий по поверхности сферы
  const waveMaxAng = 0.45 * ys;

  // Города в зоне поражения; жертвы засчитаются, когда волна дойдёт до города
  const hits = [];
  for (const c of cities) {
    if (c.alive <= 0.001) continue;
    const d = Math.acos(THREE.MathUtils.clamp(c.dir.dot(surface), -1, 1));
    if (d > angPatch) continue;
    // в эпицентре гибнут все, к краю зоны — ~5%
    const frac = d <= angPatch * 0.4 ? 1 : 1 - ((d - angPatch * 0.4) / (angPatch * 0.6)) * 0.95;
    const deaths = c.alive * frac;
    c.alive -= deaths;
    const q = Math.min(1, d / waveMaxAng);
    const at = 12 * (1 - Math.pow(1 - q, 1 / 1.8)) * ts; // момент прихода фронта
    hits.push({ at, deaths, name: c.name, done: false });
  }
  const wave = new THREE.Mesh(
    makeShockwaveGeometry(surface, waveMaxAng, 1.008),
    new THREE.ShaderMaterial({
      uniforms: { uR: { value: 0 }, uOp: { value: 0.9 } },
      vertexShader: `
        attribute float aAng;
        varying float vAng;
        void main() {
          vAng = aAng;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        varying float vAng;
        uniform float uR;
        uniform float uOp;
        void main() {
          float d = vAng - uR;
          float w = 0.015 + uR * 0.06;              // фронт размывается с расстоянием
          float x = d / w;
          float front = exp(-x * x);                // узкая яркая кромка
          float trail = d < 0.0 ? exp(d * 9.0) * 0.3 : 0.0; // пыльный шлейф позади
          float a = (front + trail) * uOp;
          vec3 col = mix(vec3(0.75, 0.6, 0.45), vec3(1.0, 0.93, 0.8), front);
          gl_FragColor = vec4(col, a);
        }`,
      transparent: true, depthWrite: false, side: THREE.DoubleSide,
    })
  );
  wave.renderOrder = 3;
  spinGroup.add(wave);

  // Гриб: огонь (additive) + дым (normal)
  const [t1, t2] = orthoBasis(surface);
  const particles = [];
  const stemH = 0.28 * ys, capR = 0.11 * ys;
  for (let i = 0; i < 46; i++) { // ножка
    particles.push({
      kind: 'fire', delay: (Math.random() * 1.2) * ts,
      h0: 0.01, h1: stemH * (0.25 + Math.random() * 0.75),
      r: 0.01 + Math.random() * 0.028 * ys,
      angle: Math.random() * Math.PI * 2, spread: 0.008 + Math.random() * 0.02,
      size: (0.03 + Math.random() * 0.045) * ys, life: (7 + Math.random() * 4) * ts,
    });
  }
  for (let i = 0; i < 70; i++) { // шляпка
    particles.push({
      kind: i < 24 ? 'fire' : 'smoke', delay: (2.0 + Math.random() * 2.5) * ts,
      h0: stemH * 0.85, h1: stemH * (0.95 + Math.random() * 0.3),
      r: 0.01, spreadTo: capR * (0.4 + Math.random() * 0.9),
      angle: Math.random() * Math.PI * 2, spread: 0,
      size: (0.05 + Math.random() * 0.07) * ys, life: (14 + Math.random() * 8) * ts,
    });
  }
  for (let i = 0; i < 30; i++) { // дым по ножке
    particles.push({
      kind: 'smoke', delay: (2.5 + Math.random() * 4) * ts,
      h0: 0.02, h1: stemH * (0.3 + Math.random() * 0.7),
      r: 0.015 + Math.random() * 0.03 * ys,
      angle: Math.random() * Math.PI * 2, spread: 0.01 + Math.random() * 0.02,
      size: (0.04 + Math.random() * 0.06) * ys, life: (16 + Math.random() * 7) * ts,
    });
  }
  const sprites = particles.map((p) => {
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: softTex,
      color: p.kind === 'fire' ? 0xffcc66 : 0x555555,
      transparent: true, opacity: 0,
      blending: p.kind === 'fire' ? THREE.AdditiveBlending : THREE.NormalBlending,
      depthWrite: false,
    }));
    s.scale.setScalar(0.001);
    spinGroup.add(s);
    return s;
  });

  let t = 0;
  const fireColorA = new THREE.Color(0xffee99), fireColorB = new THREE.Color(0xcc3300);
  const smokeColorA = new THREE.Color(0x776655), smokeColorB = new THREE.Color(0x2a2a2e);
  const totalLife = 28 * ts;

  effects.push({
    update(dt) {
      t += dt;
      const tt = t / ts; // нормированное время взрыва
      // Волна дошла до города
      for (const h of hits) {
        if (!h.done && t >= h.at) {
          h.done = true;
          totalDeaths += h.deaths;
          addFeedEntry(h.name, h.deaths);
          updateStats();
        }
      }
      // Свет вспышки: мгновенный пик, долгое затухание
      light.intensity = Math.max(0, 9 * ys * (1 - tt / 3.5));
      // Огненный шар: медленно вспухает секунды, гаснет ещё дольше
      const bk = Math.min(1, tt / 4.5);
      fireball.scale.setScalar(0.01 + 0.11 * ys * Math.sqrt(bk));
      fireball.material.uniforms.uOp.value = Math.max(0, Math.min(1, 1.2 - tt / 7));
      fireball.material.uniforms.uColor.value.lerpColors(fireColorA, fireColorB, Math.min(1, tt / 5));
      // Ударная волна: быстрый старт, затухающее замедление у края
      const rk = Math.min(1, tt / 12);
      wave.material.uniforms.uR.value = 1 - Math.pow(1 - rk, 1.8);
      wave.material.uniforms.uOp.value = 0.9 * (1 - rk);
      // Частицы гриба
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i], s = sprites[i];
        const pt = t - p.delay;
        if (pt < 0) continue;
        const lk = Math.min(1, pt / p.life);
        const rise = 1 - Math.pow(1 - lk, 2);
        const h = p.h0 + (p.h1 - p.h0) * rise;
        const spread = p.spreadTo !== undefined ? p.r + p.spreadTo * rise : p.r + p.spread * rise;
        const wobble = Math.sin(pt * 0.7 + i) * 0.004;
        const pos = surface.clone().multiplyScalar(1 + h)
          .addScaledVector(t1, Math.cos(p.angle) * spread + wobble)
          .addScaledVector(t2, Math.sin(p.angle) * spread);
        s.position.copy(pos);
        s.scale.setScalar(p.size * (0.4 + 1.1 * rise));
        const fadeIn = Math.min(1, pt / (0.8 * ts));
        s.material.opacity = fadeIn * (p.kind === 'fire' ? 0.85 : 0.65) * (1 - lk);
        if (p.kind === 'fire') s.material.color.lerpColors(fireColorA, fireColorB, lk);
        else s.material.color.lerpColors(smokeColorA, smokeColorB, lk * 0.8);
      }
      if (t > totalLife) {
        spinGroup.remove(light, fireball, wave, ...sprites);
        fireball.material.dispose(); fireball.geometry.dispose();
        wave.material.dispose(); wave.geometry.dispose();
        sprites.forEach((s) => s.material.dispose());
        return false;
      }
      return true;
    },
  });
}

// ---------- Управление: вращение, зум, клик ----------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let dragging = false, pointerDown = false;
let lastX = 0, lastY = 0, downX = 0, downY = 0;
let velX = 0, velY = 0, idleTime = 0;
let zoom = 3.2;

canvas.addEventListener('pointerdown', (e) => {
  ensureAudio();
  pointerDown = true; dragging = false;
  lastX = downX = e.clientX; lastY = downY = e.clientY;
  try { canvas.setPointerCapture(e.pointerId); } catch (err) { /* синтетические события */ }
});

canvas.addEventListener('pointermove', (e) => {
  if (!pointerDown) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 5) dragging = true;
  if (dragging) {
    // скорость вращения падает с приближением — как на картах
    const speed = 0.0045 * THREE.MathUtils.clamp((zoom - 1) / 2.2, 0.02, 1);
    spinGroup.rotation.y += dx * speed;
    tiltGroup.rotation.x = THREE.MathUtils.clamp(tiltGroup.rotation.x + dy * speed, -1.45, 1.45);
    velX = dx * speed; velY = dy * speed;
    idleTime = 0;
  }
});

canvas.addEventListener('pointerup', (e) => {
  pointerDown = false;
  if (dragging) return;
  // Клик — удар
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hit = raycaster.intersectObject(earth)[0];
  if (!hit || !earthReady) return;
  const local = earth.worldToLocal(hit.point.clone()).normalize();
  spawnMissile(local, currentYield);
  bombCount += 1;
  totalMt += currentYield;
  updateStats();
  idleTime = 0;
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom = THREE.MathUtils.clamp(zoom * (1 + e.deltaY * 0.0011), 1.05, 7);
}, { passive: false });

// ---------- UI ----------
let currentYield = 10, bombCount = 0, totalMt = 0;
const bombsEl = document.getElementById('bombs');
const megatonsEl = document.getElementById('megatons');
const deathsEl = document.getElementById('deaths');
const feedEl = document.getElementById('feed');

function updateStats() {
  bombsEl.textContent = bombCount;
  megatonsEl.textContent = totalMt;
  deathsEl.textContent = totalDeaths > 0 ? fmtPeople(totalDeaths) : '0';
}

function addFeedEntry(name, deaths) {
  const div = document.createElement('div');
  div.textContent = `☠ ${name} — ${fmtPeople(deaths)}`;
  feedEl.prepend(div);
  while (feedEl.children.length > 5) feedEl.lastChild.remove();
}

document.querySelectorAll('button[data-yield]').forEach((btn) => {
  btn.addEventListener('click', () => {
    currentYield = Number(btn.dataset.yield);
    document.querySelectorAll('button[data-yield]').forEach((b) => b.classList.toggle('active', b === btn));
  });
});

const labelsBtn = document.getElementById('labels');
labelsBtn.addEventListener('click', () => {
  const L = LAYERS.find((l) => l.name === 'labels');
  L.enabled = !L.enabled;
  overlayGroup.visible = L.enabled;
  labelsBtn.classList.toggle('active', L.enabled);
  labelsBtn.textContent = L.enabled ? 'Границы и названия: вкл' : 'Границы и названия: выкл';
});

document.getElementById('reset').addEventListener('click', () => {
  for (const c of craterDecals) {
    spinGroup.remove(c);
    c.geometry.dispose();
    c.material.dispose();
  }
  craterDecals.length = 0;
  for (const g of glowDecals) {
    spinGroup.remove(g.mesh);
    g.mesh.geometry.dispose();
    g.mesh.material.dispose();
  }
  glowDecals.length = 0;
  bombCount = 0; totalMt = 0; totalDeaths = 0;
  for (const c of cities) c.alive = c.pop;
  feedEl.innerHTML = '';
  updateStats();
});

// ---------- Главный цикл ----------
const clock = new THREE.Clock();
let tileTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Инерция и автовращение (автовращение — только на дальнем зуме)
  if (!pointerDown) {
    spinGroup.rotation.y += velX;
    tiltGroup.rotation.x = THREE.MathUtils.clamp(tiltGroup.rotation.x + velY, -1.45, 1.45);
    velX *= 0.93; velY *= 0.93;
    idleTime += dt;
    if (idleTime > 3 && zoom > 2) spinGroup.rotation.y += dt * 0.04;
  }

  // Эффекты
  for (let i = effects.length - 1; i >= 0; i--) {
    if (!effects[i].update(dt)) effects.splice(i, 1);
  }
  updateGlows(dt);

  // Камера: зум + тряска
  shake = Math.max(0, shake - dt * 0.012);
  camera.position.set(
    (Math.random() - 0.5) * shake,
    (Math.random() - 0.5) * shake,
    zoom + (Math.random() - 0.5) * shake
  );
  camera.lookAt(0, 0, 0);

  // Подгрузка тайлов (после установки камеры)
  tileTimer += dt;
  if (tileTimer > 0.3) {
    tileTimer = 0;
    reconcileTiles();
  }

  renderer.render(scene, camera);
}
animate();

// отладочный хук для автотестов
window.__dbg = {
  tileCount: () => LAYERS.reduce((sum, l) => sum + l.meshes.size, 0),
  setZoom: (v) => { zoom = v; },
  reconcile: () => reconcileTiles(),
  boomAt: (mt, lat, lon) => detonate(
    lat === undefined
      ? new THREE.Vector3(0, 0, 1)
      : lonLatToDir(lon * Math.PI / 180, lat * Math.PI / 180),
    mt || 10
  ),
  missile: (mt) => spawnMissile(new THREE.Vector3(0.25, 0.3, 1).normalize(), mt || 10),
  step: (sec) => {
    const dt = 1 / 30;
    for (let f = 0; f < sec * 30; f++) {
      for (let i = effects.length - 1; i >= 0; i--) {
        if (!effects[i].update(dt)) effects.splice(i, 1);
      }
      updateGlows(dt);
    }
  },
  state: () => JSON.stringify({
    ready: earthReady, zoom,
    layers: LAYERS.map((l) => ({ name: l.name, meshes: l.meshes.size, cache: l.cache.size })),
  }),
};
</script>
